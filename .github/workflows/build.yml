name: Build FFmpeg

on:
  push:
    paths:
      - ffmpeg_tag.txt
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      # -------------------------
      # Checkout repository
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Read FFmpeg version and force on Windows
      # -------------------------
      - name: Set FFmpeg version
        run: |
          VERSION=$(cat ffmpeg_tag.txt)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        shell: bash

      # -------------------------
      # Linux dependencies
      # -------------------------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config yasm nasm zip

      # -------------------------
      # macOS dependencies
      # -------------------------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install yasm nasm zip

      # -------------------------
      # Windows dependencies
      # -------------------------
      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          install: >-
            git
            make
            yasm
            nasm
            mingw-w64-x86_64-gcc
            zip

      # -------------------------
      # Run build (Linux/macOS)
      # -------------------------
      - name: Build FFmpeg (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x build.sh
          ./build.sh

      # -------------------------
      # Run build (Windows)
      # -------------------------
      - name: Build FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          chmod +x build.sh
          ./build.sh

      # -------------------------
      # Package artifact cross-platform
      # -------------------------
      - name: Package artifact
        shell: bash
        run: |
          mkdir -p release
          cp -r artifact/* release/

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            FILENAME="ffmpeg-${VERSION}-Windows.zip"
            powershell -Command "Compress-Archive -LiteralPath @(Get-ChildItem release -File | ForEach-Object { \$_.FullName }) -DestinationPath $FILENAME -Force"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            FILENAME="ffmpeg-${VERSION}-macOS.zip"
            zip -r "$FILENAME" release
          else
            FILENAME="ffmpeg-${VERSION}-Linux.zip"
            zip -r "$FILENAME" release
          fi

          echo "PACKAGE=$FILENAME" >> $GITHUB_ENV

      # -------------------------
      # Upload artifact
      # -------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ runner.os }}
          path: ${{ env.PACKAGE }}
          overwrite: true

      # -------------------------
      # Upload to GitHub Release
      # -------------------------
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ffmpeg-${{ env.VERSION }}
          name: FFmpeg-${{ env.VERSION }}
          files: ${{ env.PACKAGE }}
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
